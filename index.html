<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โปรไฟล์นักศึกษา - ศุภณัฐ บุญศิริ</title>
    <style>
        /* นำเข้าฟอนต์ Kanit เพื่อความสวยงามและเป็นทางการ */
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Kanit', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e0f2fe 0%, #f0fdf4 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .profile-card {
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            max-width: 480px;
            width: 100%;
            padding: 35px 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .profile-card:hover {
            transform: translateY(-5px);
        }

        /* แถบสีตกแต่งด้านบนการ์ด */
        .card-accent {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 10px;
            background: linear-gradient(90deg, #1d4ed8, #059669);
        }

        .avatar-container {
            position: relative;
            width: 160px;
            height: 160px;
            margin: 10px auto 20px;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #ffffff;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
        }

        .name {
            font-size: 26px;
            color: #1e293b;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .nickname {
            font-size: 16px;
            color: #64748b;
            font-weight: 400;
            margin-bottom: 15px;
        }

        .student-id {
            display: inline-block;
            background-color: #eff6ff;
            color: #1d4ed8;
            padding: 6px 18px;
            border-radius: 50px;
            font-weight: 500;
            font-size: 15px;
            margin-bottom: 30px;
            border: 1px solid #bfdbfe;
        }

        .info-section {
            text-align: left;
            border-top: 1px solid #f1f5f9;
            padding-top: 25px;
        }

        .info-item {
            margin-bottom: 16px;
            display: flex;
            align-items: flex-start;
            font-size: 16px;
            line-height: 1.5;
        }

        .info-label {
            font-weight: 500;
            color: #64748b;
            min-width: 110px;
            flex-shrink: 0;
        }

        .info-value {
            color: #334155;
            font-weight: 400;
        }

        .info-value a {
            color: #1d4ed8;
            text-decoration: none;
            transition: color 0.2s;
        }

        .info-value a:hover {
            text-decoration: underline;
            color: #1e40af;
        }

        .university-footer {
            margin-top: 25px;
            font-size: 14px;
            color: #059669;
            font-weight: 500;
            text-align: center;
            border-top: 1px solid #f1f5f9;
            padding-top: 20px;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="card-accent"></div>
        
        <div class="avatar-container">
            <!-- 
              [คำแนะนำเรื่องรูปภาพ]
              - วิธีที่ 1: นำรูปของคุณมาเปลี่ยนชื่อเป็น profile.jpg แล้ววางไว้ในโฟลเดอร์เดียวกับไฟล์นี้
              - วิธีที่ 2: หากมีลิงก์รูปตรง (Direct Link) สามารถนำมาวางแทนคำว่า profile.jpg ได้เลย
            -->
            <img src="profile.jpg" alt="รูปโปรไฟล์ ศุภณัฐ" class="profile-img" onerror="this.src='https://discord.com/channels/@me/1500663799420551268/1518898703753281586'">
        </div>
        
        <div class="name">ศุภณัฐ บุญศิริ</div>
        <div class="nickname">ชื่อเล่น: แน็ค</div>
        <div class="student-id">รหัสนักศึกษา: 694245013</div>

        <div class="info-section">
            <div class="info-item">
                <span class="info-label">สาขาวิชา</span>
                <span class="info-value">วิทยาการคอมพิวเตอร์</span>
            </div>
            <div class="info-item">
                <span class="info-label">คณะ</span>
                <span class="info-value">วิทยาศาสตร์และเทคโนโลยี</span>
            </div>
            <div class="info-item">
                <span class="info-label">เบอร์โทรศัพท์</span>
                <span class="info-value"><a href="tel:0990133950">099-0133950</a></span>
            </div>
            <div class="info-item">
                <span class="info-label">อีเมล</span>
                <span class="info-value"><a href="mailto:694245013@mcru.ac.th">694245013@mcru.ac.th</a></span>
            </div>
        </div>

        <div class="university-footer">
            มหาวิทยาลัยราชภัฏหมู่บ้านจอมบึง
        </div>
    </div>

</body>
</html>
