<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โปรไฟล์ - ศุภณัฐ บุญศิริ</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, 'Kanit';
        }

        body {
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .profile-card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            max-width: 450px;
            width: 100%;
            padding: 30px;
            text-align: center;
            border-top: 8px solid #0056b3;
        }

        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #eef2f3;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .name {
            font-size: 24px;
            color: #333333;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .nickname {
            font-size: 16px;
            color: #666666;
            margin-bottom: 15px;
        }

        .student-id {
            display: inline-block;
            background-color: #e3f2fd;
            color: #0d47a1;
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .info-section {
            text-align: left;
            border-top: 1px solid #eeeeee;
            padding-top: 20px;
        }

        .info-item {
            margin-bottom: 12px;
            display: flex;
            align-items: flex-start;
            font-size: 15px;
            color: #444444;
        }

        .info-label {
            font-weight: bold;
            color: #555555;
            min-width: 100px;
            flex-shrink: 0;
        }

        .info-value {
            color: #222222;
        }

        .university {
            margin-top: 20px;
            font-size: 13px;
            color: #888888;
            text-align: center;
            border-top: 1px solid #eeeeee;
            padding-top: 15px;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <img src="ใส่ลิงก์ตรงของรูปภาพที่นี่" alt="รูปโปรไฟล์" class="profile-img" onerror="this.src='https://via.placeholder.com/150?text=Profile+Image'">
        
        <div class="name">ศุภณัฐ บุญศิริ</div>
        <div class="nickname">ชื่อเล่น: แน็ค</div>
        <div class="student-id">รหัสนักศึกษา: 694245013</div>

        <div class="info-section">
            <div class="info-item">
                <span class="info-label">สาขาวิชา:</span>
                <span class="info-value">วิทยาการคอมพิวเตอร์</span>
            </div>
            <div class="info-item">
                <span class="info-label">คณะ:</span>
                <span class="info-value">วิทยาศาสตร์และเทคโนโลยี</span>
            </div>
            <div class="info-item">
                <span class="info-label">เบอร์โทรศัพท์:</span>
                <span class="info-value">099-0133950</span>
            </div>
            <div class="info-item">
                <span class="info-label">อีเมล:</span>
                <span class="info-value"><a href="mailto:694245013@mcru.ac.th" style="color: #0056b3; text-decoration: none;">694245013@mcru.ac.th</a></span>
            </div>
        </div>

        <div class="university">
            มหาวิทยาลัยราชภัฏหมู่บ้านจอมบึง
        </div>
    </div>

</body>
</html>
