<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โปรไฟล์ - ศุภณัฐ บุญศิริ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e0eafc, #cfdef3);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .profile-card {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
            padding: 30px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .profile-card:hover {
            transform: translateY(-5px);
        }

        .profile-img-container {
            width: 150px;
            height: 150px;
            margin: 0 auto 20px;
            border-radius: 50%;
            overflow: hidden;
            border: 5px solid #4a90e2;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .student-id {
            display: inline-block;
            background: #4a90e2;
            color: #ffffff;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: bold;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .name {
            font-size: 1.6rem;
            color: #333333;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .nickname {
            font-size: 1.1rem;
            color: #666666;
            margin-bottom: 25px;
        }

        .info-section {
            text-align: left;
            border-top: 1px solid #eeeeee;
            padding-top: 20px;
        }

        .info-item {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        .info-label {
            font-size: 0.85rem;
            color: #999999;
            text-transform: uppercase;
            margin-bottom: 2px;
            font-weight: 600;
        }

        .info-value {
            font-size: 1.05rem;
            color: #444444;
        }

        .university-tag {
            margin-top: 25px;
            font-size: 0.9rem;
            color: #777777;
            font-weight: 500;
            border-top: 1px dashed #dddddd;
            padding-top: 15px;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="profile-img-container">
            <img class="profile-img" src="profile.jpg" alt="รูปโปรไฟล์ของ ศุภณัฐ บุญศิริ" onerror="this.src='https://via.placeholder.com/150?text=Profile+Image'">
        </div>

        <div class="student-id">ID: 694245013</div>

        <div class="name">ศุภณัฐ บุญศิริ</div>
        <div class="nickname">ชื่อเล่น: แน็ค</div>

        <div class="info-section">
            <div class="info-item">
                <span class="info-label">เบอร์โทรศัพท์</span>
                <span class="info-value">099-013-3950</span>
            </div>
            
            <div class="info-item">
                <span class="info-label">อีเมล</span>
                <span class="info-value"><a href="mailto:694245013@mcru.ac.th" style="color: #4a90e2; text-decoration: none;">694245013@mcru.ac.th</a></span>
            </div>

            <div class="info-item">
                <span class="info-label">สาขาวิชา</span>
                <span class="info-value">วิทยาการคอมพิวเตอร์</span>
            </div>

            <div class="info-item">
                <span class="info-label">คณะ</span>
                <span class="info-value">วิทยาศาสตร์และเทคโนโลยี</span>
            </div>
        </div>

        <div class="university-tag">
            มหาวิทยาลัยราชภัฏหมู่บ้านจอมบึง
        </div>
    </div>

</body>
</html>
